<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KMZ Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #2c3e50; color: white; z-index: 1000; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .controls select { padding: 6px 10px; border-radius: 6px; border: none; font-size: 14px; cursor: pointer; }
        .controls input[type="file"] { font-size: 13px; }
        #status { font-size: 13px; opacity: 0.8; }
        #map { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>
    <div class="controls">
        <strong>KMZ:</strong>
        <select id="kmzSelect">
            <option value="">-- Seleccionar --</option>
            <option value="https://raw.githubusercontent.com/Totalitoplay/kmz-finder/main/ALDAMA_1.kmz" selected>Aldama 1</option>
            <!-- Agrega aquí más archivos: -->
            <!-- <option value="OTRO.kmz">Otro nombre</option> -->
        </select>
        <span style="opacity:0.4">|</span>
        <span style="font-size:13px">o sube uno:</span>
        <input type="file" id="fileInput" accept=".kmz" />
        <span id="status"></span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const BASE_URL = 'https://github.com/Totalitoplay/kmz-finder/raw/refs/heads/main/';

        var map = L.map('map').setView([25.68, -100.31], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        var layerGroup = L.layerGroup().addTo(map);
        const status = document.getElementById('status');

        async function loadKMZFromArrayBuffer(buffer) {
            const zip = await JSZip.loadAsync(buffer);
            const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
            if (!kmlFile) { alert('No se encontró KML'); return; }

            const kmlText = await kmlFile.async('string');
            const kmlDoc = new DOMParser().parseFromString(kmlText, 'text/xml');

            const styles = {};
            kmlDoc.querySelectorAll('Style').forEach(style => {
                const id = style.getAttribute('id');
                if (!id) return;
                const iconHref = style.querySelector('IconStyle Icon href')?.textContent?.trim();
                const lineColor = style.querySelector('LineStyle color')?.textContent?.trim();
                const polyColor = style.querySelector('PolyStyle color')?.textContent?.trim();
                styles['#' + id] = { iconHref, lineColor, polyColor };
            });

            kmlDoc.querySelectorAll('StyleMap').forEach(sm => {
                const id = sm.getAttribute('id');
                const normalKey = [...sm.querySelectorAll('Pair')].find(p => p.querySelector('key')?.textContent === 'normal');
                const styleUrl = normalKey?.querySelector('styleUrl')?.textContent?.trim();
                if (id && styleUrl) styles['#' + id] = styles[styleUrl] || {};
            });

            function kmlColorToHex(c) {
                if (!c || c.length < 8) return null;
                return '#' + c.slice(6, 8) + c.slice(4, 6) + c.slice(2, 4);
            }

            const layers = [];

            kmlDoc.querySelectorAll('Placemark').forEach(placemark => {
                const name = placemark.querySelector('name')?.textContent?.trim() || '';
                const desc = placemark.querySelector('description')?.textContent?.trim() || '';
                const styleUrl = placemark.querySelector('styleUrl')?.textContent?.trim();
                const style = styles[styleUrl] || {};
                const popup = `<b>${name}</b>${desc ? '<br>' + desc : ''}`;

                placemark.querySelectorAll('Polygon').forEach(poly => {
                    const coords = parseCoords(poly.querySelector('outerBoundaryIs coordinates'));
                    if (!coords.length) return;
                    const color = kmlColorToHex(style.polyColor) || kmlColorToHex(style.lineColor) || '#3388ff';
                    const layer = L.polygon(coords, { color, fillColor: color, fillOpacity: 0.4 });
                    layer.bindPopup(popup);
                    if (name) layer.bindTooltip(name, { sticky: true });
                    layers.push(layer);
                });

                placemark.querySelectorAll('LineString').forEach(line => {
                    const coords = parseCoords(line.querySelector('coordinates'));
                    if (!coords.length) return;
                    const color = kmlColorToHex(style.lineColor) || '#e74c3c';
                    const layer = L.polyline(coords, { color, weight: 3 });
                    layer.bindPopup(popup);
                    if (name) layer.bindTooltip(name, { sticky: true });
                    layers.push(layer);
                });

                placemark.querySelectorAll('Point').forEach(point => {
                    const coords = parseCoords(point.querySelector('coordinates'));
                    if (!coords.length) return;
                    const marker = style.iconHref
                        ? L.marker(coords[0], { icon: L.icon({ iconUrl: style.iconHref, iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] }) })
                        : L.marker(coords[0]);
                    marker.bindPopup(popup);
                    if (name) marker.bindTooltip(name, { permanent: false, direction: 'top' });
                    layers.push(marker);
                });
            });

            layerGroup.clearLayers();
            if (!layers.length) { alert('Sin geometrías válidas'); return; }
            layers.forEach(l => layerGroup.addLayer(l));
            map.fitBounds(layerGroup.getBounds());
        }

        function parseCoords(el) {
            if (!el?.textContent) return [];
            return el.textContent.trim().split(/\s+/).map(c => {
                const p = c.split(',').map(Number);
                if (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) return null;
                return [p[1], p[0]];
            }).filter(Boolean);
        }

        async function loadFromURL(filename) {
            status.textContent = `Cargando ${filename}...`;
            try {
                const r = await fetch(BASE_URL + filename);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const buf = await r.arrayBuffer();
                await loadKMZFromArrayBuffer(buf);
                status.textContent = `${filename} cargado ✓`;
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }
        }

        // Selector
        document.getElementById('kmzSelect').addEventListener('change', function() {
            if (this.value) loadFromURL(this.value);
        });

        // Subida manual
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            status.textContent = `Cargando ${file.name}...`;
            const buf = await file.arrayBuffer();
            await loadKMZFromArrayBuffer(buf);
            status.textContent = `${file.name} cargado ✓`;
        });

        // Cargar el default
        loadFromURL('ALDAMA_1.kmz');
    </script>
</body>
</html>
