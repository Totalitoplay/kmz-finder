<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KMZ Finder - Cloudflare</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #2c3e50; color: white; z-index: 1000; }
        #map { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>

    <div class="controls">
        <strong>Subir KMZ: </strong>
        <input type="file" id="fileInput" accept=".kmz" />
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/leaflet-kmz@1.0.8/dist/leaflet-kmz.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var map = L.map('map').setView([25.68, -100.31], 5); // Centrado inicial

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Configuramos el plugin con opciones de control
            var kmz = L.kmzLayer().addTo(map);

            document.getElementById('fileInput').addEventListener('change', function (e) {
                var file = e.target.files[0];
                if (!file) return;

                // Creamos la URL del objeto para que el plugin lo procese como string
                var blobUrl = URL.createObjectURL(file);

                // Limpiamos capas previas para evitar conflictos de coordenadas
                kmz.clearLayers();

                // Cargamos el archivo
                kmz.load(blobUrl);

                // Manejo de errores y centrado seguro
                kmz.on('load', function(e) {
                    try {
                        var bounds = e.layer.getBounds();
                        if (bounds.isValid()) { // Verificación clave para evitar el error de image_d9f2bc.jpg
                            map.fitBounds(bounds);
                        }
                    } catch (err) {
                        console.warn("No se pudo obtener límites automáticos, pero los datos deberían estar ahí.");
                    }
                    URL.revokeObjectURL(blobUrl); // Limpieza de memoria
                });
            });
        });
    </script>
</body>
</html>
