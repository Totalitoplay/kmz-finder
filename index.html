<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KMZ Finder - Cloudflare</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #2c3e50; color: white; z-index: 1000; }
        #map { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>

    <div class="controls">
        <strong>Subir KMZ: </strong>
        <input type="file" id="fileInput" accept=".kmz" />
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/leaflet-kmz@1.0.8/dist/leaflet-kmz.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // 1. Inicializar mapa
        var map = L.map('map').setView([25.68, -100.31], 5);
    
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
    
        // 2. Configurar el plugin KMZ con un manejador de errores interno
        var kmz = L.kmzLayer().addTo(map);
    
        // 3. Manejar la subida del archivo
        document.getElementById('fileInput').addEventListener('change', function (e) {
            var file = e.target.files[0];
            if (!file) return;
    
            // Limpiar capas previas para evitar que el error se arrastre
            kmz.clearLayers();
    
            var blobUrl = URL.createObjectURL(file);
    
            // Escuchamos el evento 'load' ANTES de cargar para estar listos
            kmz.on('load', function(e) {
                try {
                    // Verificamos si la capa tiene límites válidos antes de hacer zoom
                    if (e.layer && typeof e.layer.getBounds === 'function') {
                        var bounds = e.layer.getBounds();
                        if (bounds.isValid()) {
                            map.fitBounds(bounds);
                        }
                    }
                } catch (err) {
                    console.warn("Error silencioso al ajustar límites:", err);
                }
                URL.revokeObjectURL(blobUrl);
            });
    
            // Cargamos el archivo
            kmz.load(blobUrl);
        });
    });
    </script>
</body>
</html>
