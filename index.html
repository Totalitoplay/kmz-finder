<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KMZ Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #2c3e50; color: white; z-index: 1000; }
        #map { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>
    <div class="controls">
        <strong>Subir KMZ: </strong>
        <input type="file" id="fileInput" accept=".kmz" />
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        var map = L.map('map').setView([25.68, -100.31], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        var layerGroup = L.layerGroup().addTo(map);

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            var file = e.target.files[0];
            if (!file) return;

            layerGroup.clearLayers();

            const zip = await JSZip.loadAsync(file);

            // Buscar el .kml dentro del zip
            const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
            if (!kmlFile) { alert('No se encontró KML dentro del KMZ'); return; }

            const kmlText = await kmlFile.async('string');
            const parser = new DOMParser();
            const kmlDoc = parser.parseFromString(kmlText, 'text/xml');

            const layers = [];

            // Parsear Placemarks
            kmlDoc.querySelectorAll('Placemark').forEach(placemark => {
                // Polígonos
                placemark.querySelectorAll('Polygon').forEach(poly => {
                    const coords = parseCoords(poly.querySelector('outerBoundaryIs coordinates'));
                    if (coords.length) layers.push(L.polygon(coords));
                });

                // Líneas
                placemark.querySelectorAll('LineString').forEach(line => {
                    const coords = parseCoords(line.querySelector('coordinates'));
                    if (coords.length) layers.push(L.polyline(coords));
                });

                // Puntos
                placemark.querySelectorAll('Point').forEach(point => {
                    const coords = parseCoords(point.querySelector('coordinates'));
                    if (coords.length) layers.push(L.marker(coords[0]));
                });
            });

            if (!layers.length) { alert('No se encontraron geometrías válidas'); return; }

            layers.forEach(l => layerGroup.addLayer(l));
            map.fitBounds(layerGroup.getBounds());
        });

        function parseCoords(el) {
            if (!el || !el.textContent) return [];
            return el.textContent.trim().split(/\s+/)
                .map(c => {
                    const parts = c.split(',').map(Number);
                    if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
                    return [parts[1], parts[0]]; // lat, lng
                })
                .filter(Boolean);
        }
    </script>
</body>
</html>
